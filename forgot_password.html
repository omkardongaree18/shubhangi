<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Forgot Password | AI University</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(to right,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center}
.card{max-width:450px;width:100%;padding:30px;border-radius:20px;background:rgba(255,255,255,0.95);box-shadow:0 15px 40px rgba(0,0,0,0.4)}
.card h3{text-align:center;color:#764ba2;font-weight:bold;margin-bottom:25px}
.form-control:focus{box-shadow:0 0 6px #764ba2;border-color:#764ba2}
.btn-primary{background:#764ba2;border:none;font-weight:bold;padding:10px}
.text-center a{color:#764ba2;font-weight:bold}
.input-group-text{background:#764ba2;color:white;border:none}
@media(max-width:768px){.card{padding:20px}}
</style>
</head>
<body>
<div class="card">
  <h3>Reset Password</h3>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat,msg in messages %}
    <div class="alert alert-{{ 'danger' if cat=='error' else 'success' }} py-2 small">{{ msg }}</div>
    {% endfor %}{% endif %}
  {% endwith %}
  <form method="POST" action="{{ url_for('forgot_password') }}">
    <div class="mb-3">
      <label>Email</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
        <input type="email" class="form-control" name="email" placeholder="Enter your registered email" required>
      </div>
    </div>
    <div class="mb-3">
      <label>New Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input type="password" class="form-control" name="new_password" placeholder="Enter new password" required>
      </div>
    </div>
    <div class="mb-3">
      <label>Confirm Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input type="password" class="form-control" name="confirm_password" placeholder="Confirm new password" required>
      </div>
    </div>
    <button type="submit" class="btn btn-primary w-100">Reset Password</button>
  </form>
  <p class="text-center mt-3">
    <a href="{{ url_for('login') }}">Back to Login</a> |
    <a href="{{ url_for('home') }}">Home</a>
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
