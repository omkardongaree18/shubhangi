<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}AI University Portal{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#04080f;--surface:#080e1a;--border:#1a2840;--text:#e2e8f0;--muted:#64748b;--accent1:#00f5a0;--accent2:#38bdf8;--accent3:#a78bfa;--danger:#f87171;--warning:#fbbf24;--font:'Outfit',sans-serif;--mono:'DM Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none}
.glass{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px}
.glass-sm{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px}
.btn-accent{background:linear-gradient(135deg,var(--accent1),var(--accent2));border:none;color:#04080f;font-weight:800;border-radius:10px;padding:10px 22px;cursor:pointer;transition:.2s;font-family:var(--font);display:inline-block}
.btn-accent:hover{opacity:.9;transform:translateY(-1px)}
.inp{background:#0c1424;border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;width:100%;transition:border .2s;font-family:var(--font)}
.inp:focus{border-color:var(--accent1)}
select.inp{cursor:pointer}
textarea.inp{resize:vertical;min-height:100px}
label.lbl{color:var(--muted);font-size:11px;letter-spacing:.08em;display:block;margin-bottom:5px;text-transform:uppercase}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
{% block navbar %}{% endblock %}
{% block content %}{% endblock %}
{% block footer %}
<footer style="background:#04080f;border-top:1px solid #1a2840;padding:22px 0;color:#64748b;font-size:13px;text-align:center;margin-top:60px">
  © {{ current_year }} AI University Academic Portal · All Rights Reserved
</footer>
{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
